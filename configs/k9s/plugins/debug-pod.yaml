#--- Create alpine debug pod in same namespace and node as selected pod
plugins:
  debug:
    shortCut: Shift-D
    description: Create Debug Pod
    dangerous: true
    scopes:
      - pods
    command: bash
    background: false
    args:
      - -c
      - |
        NODE=$(kubectl get pod $NAME -n $NAMESPACE -o jsonpath='{.spec.nodeName}')
        kubectl run debug-alpine-delete-me-$RANDOM \
          --namespace $NAMESPACE \
          --image=alpine \
          --restart=Never \
          --overrides="{\"spec\":{\"nodeName\":\"$NODE\"}}" \
          -- /bin/sh -c "sleep infinity"