# Manage argo-rollouts
# See https://argoproj.github.io/argo-rollouts/
# <g> Get rollout details
# <a> Watch rollout progress
# <p> (with confirmation) Promote rollout
# <r> (with confirmation) Restart rollout
plugins:
  argo-rollouts-get:
    shortCut: g
    confirm: false
    description: Get details
    scopes:
      - rollouts
    command: bash
    background: false
    args:
      - -c
      - kubectl argo rollouts get rollout $NAME --context $CONTEXT -n $NAMESPACE |& less -R
  argo-rollouts-watch:
    shortCut: a
    confirm: false
    description: Watch progress
    scopes:
      - rollouts
    command: bash
    background: false
    args:
      - -c
      - kubectl argo rollouts get rollout $NAME --context $CONTEXT -n $NAMESPACE -w
  argo-rollouts-promote:
    shortCut: p
    confirm: true
    description: Promote
    scopes:
      - rollouts
    command: bash
    background: false
    args:
      - -c
      - kubectl argo rollouts promote $NAME --context $CONTEXT -n $NAMESPACE |& less -R
  argo-rollouts-restart:
    shortCut: r
    confirm: true
    description: Restart
    scopes:
      - rollouts
    command: bash
    background: false
    args:
      - -c
      - kubectl argo rollouts restart $NAME --context $CONTEXT -n $NAMESPACE |& less
  argo-rollouts-retry:
    shortCut: x
    confirm: true
    description: Retry
    scopes:
      - rollouts
    command: bash
    background: false
    args:
      - -c
      - |
        ANALYSIS_RUN=$(kubectl get rollout $NAME -n $NAMESPACE --context $CONTEXT -o jsonpath='{.status.blueGreen.prePromotionAnalysisRunStatus.name}' 2>/dev/null)
        if [ -n "$ANALYSIS_RUN" ]; then
          echo "Deleting analysis run: $ANALYSIS_RUN"
          kubectl delete analysisrun $ANALYSIS_RUN -n $NAMESPACE --context $CONTEXT 2>/dev/null || true
        fi
        kubectl argo rollouts retry $NAME --context $CONTEXT -n $NAMESPACE |& less